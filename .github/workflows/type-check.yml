name: Type Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn run check:type
